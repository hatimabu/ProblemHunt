name: Deploy Azure resources

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'azuredeploy.json'
      - '.github/workflows/azure-deploy.yml'
      - 'problem-hunt/**'

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: eastus2
  AZURE_RESOURCE_GROUP: problemhunt-rg
  DEPLOYMENT_TEMPLATE: ./azuredeploy.json

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: problem-hunt/package-lock.json

      - name: Install frontend dependencies
        working-directory: problem-hunt
        run: npm ci

      - name: Build frontend
        working-directory: problem-hunt
        run: npm run build

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create or update resource group
        run: az group create --name "$AZURE_RESOURCE_GROUP" --location "$AZURE_LOCATION"

      - name: Deploy ARM template
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: ${{ env.DEPLOYMENT_TEMPLATE }}
          parameters: appName=problemhunt environment=prod location=${{ env.AZURE_LOCATION }}

      - name: Deploy static web app content
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /problem-hunt
          api_location: /problem-hunt/python-function
          output_location: dist
