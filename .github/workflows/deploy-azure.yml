name: Deploy ProblemHunt to Azure

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.11'
  FRONTEND_PATH: 'problem-hunt'
  BACKEND_PATH: 'problem-hunt/python-function'
  TF_VERSION: '1.8.0'
  RESOURCE_GROUP: 'problemhunt'

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Provision Infrastructure with Terraform
  # ---------------------------------------------------------------------------
  infrastructure:
    runs-on: ubuntu-latest
    name: Provision Infrastructure
    outputs:
      function_app_name: ${{ steps.tf_outputs.outputs.function_app_name }}
      function_app_hostname: ${{ steps.tf_outputs.outputs.function_app_hostname }}
      cosmos_db_endpoint: ${{ steps.tf_outputs.outputs.cosmos_db_endpoint }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve

      - name: Capture Terraform Outputs
        id: tf_outputs
        working-directory: infra
        run: |
          echo "function_app_name=$(terraform output -raw function_app_name)" >> $GITHUB_OUTPUT
          echo "function_app_hostname=$(terraform output -raw function_app_default_hostname)" >> $GITHUB_OUTPUT
          echo "cosmos_db_endpoint=$(terraform output -raw cosmos_db_endpoint)" >> $GITHUB_OUTPUT

      - name: Configure Function App Settings (Cosmos DB from Terraform)
        run: |
          cd infra
          COSMOS_KEY=$(terraform output -raw cosmos_db_primary_key)
          az functionapp config appsettings set \
            --name ${{ steps.tf_outputs.outputs.function_app_name }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings \
              COSMOS_ENDPOINT="${{ steps.tf_outputs.outputs.cosmos_db_endpoint }}" \
              COSMOS_KEY="$COSMOS_KEY" \
              COSMOS_DATABASE="ProblemHuntDB" \
              COSMOS_CONTAINER_PROBLEMS="Problems" \
              COSMOS_CONTAINER_PROPOSALS="Proposals" \
              COSMOS_CONTAINER_UPVOTES="Upvotes" \
              COSMOS_CONTAINER_TIPS="Tips"

      - name: Configure Function App Settings (Supabase from Secrets)
        if: secrets.SUPABASE_JWT_SECRET != ''
        run: |
          az functionapp config appsettings set \
            --name ${{ steps.tf_outputs.outputs.function_app_name }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings \
              SUPABASE_JWT_SECRET="${{ secrets.SUPABASE_JWT_SECRET }}" \
              SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}" \
              SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

  # ---------------------------------------------------------------------------
  # JOB 2: Build Frontend
  # ---------------------------------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    needs: infrastructure
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    name: Build Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci

      - name: Build Vite app
        working-directory: ${{ env.FRONTEND_PATH }}
        env:
          VITE_FARO_URL: ${{ secrets.VITE_FARO_URL }}
          VITE_FARO_APP_NAME: problemhunt
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: https://${{ needs.infrastructure.outputs.function_app_hostname }}
          VITE_ALCHEMY_SOLANA_RPC_URL: ${{ secrets.VITE_ALCHEMY_SOLANA_RPC_URL }}
          NODE_ENV: production
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_PATH }}/dist
          retention-days: 1

  # ---------------------------------------------------------------------------
  # JOB 3: Deploy Frontend to Azure Static Web Apps
  # ---------------------------------------------------------------------------
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    name: Deploy Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_PATH }}/dist

      - name: Deploy to Azure Static Web Apps
        id: deploy-swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: ${{ env.FRONTEND_PATH }}
          api_location: ""          # Backend is a separate Function App
          output_location: "dist"
          skip_app_build: true      # We already built in the previous job

  # ---------------------------------------------------------------------------
  # JOB 4: Deploy Backend (Python Azure Functions)
  # ---------------------------------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    needs: infrastructure
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    name: Deploy Backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        id: deploy-functions
        with:
          app-name: ${{ needs.infrastructure.outputs.function_app_name }}
          slot-name: 'production'
          package: ${{ env.BACKEND_PATH }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true

  # ---------------------------------------------------------------------------
  # JOB 5: Close Pull Request Environment
  # ---------------------------------------------------------------------------
  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Environment
    steps:
      - name: Close SWA Pull Request Environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
          app_location: ${{ env.FRONTEND_PATH }}
