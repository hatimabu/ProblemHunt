name: Deploy ProblemHunt to Azure

on:
  push:
    branches: [main]
    paths:
      - 'azureARM.json'
      - '.github/workflows/deploy-azure.yml'
      - 'problem-hunt/**'
  workflow_dispatch:

concurrency:
  group: problemhunt-azure-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: '20'
  FRONTEND_PATH: problem-hunt
  AZURE_RESOURCE_GROUP: problemhunt
  AZURE_LOCATION: eastus2
  AZURE_APP_NAME: problemhunt
  AZURE_TEMPLATE_FILE: ./azureARM.json

jobs:
  test:
    uses: ./.github/workflows/python-tests.yml

  deploy:
    runs-on: ubuntu-latest
    name: Deploy App
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create or update resource group
        run: az group create --name "$AZURE_RESOURCE_GROUP" --location "$AZURE_LOCATION"

      - name: Deploy ARM template
        id: arm
        run: |
          set -euo pipefail
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file "$AZURE_TEMPLATE_FILE" \
            --parameters appName="$AZURE_APP_NAME" location="$AZURE_LOCATION" environment=prod \
            --query properties.outputs --output json > deployment-outputs.json

          echo "STATIC_WEB_APP_NAME=$(jq -r '.staticWebAppName.value' deployment-outputs.json)" >> "$GITHUB_ENV"
          echo "COSMOS_ENDPOINT=$(jq -r '.cosmosEndpoint.value' deployment-outputs.json)" >> "$GITHUB_ENV"

          COSMOS_KEY=$(jq -r '.cosmosPrimaryKey.value' deployment-outputs.json)
          echo "::add-mask::$COSMOS_KEY"
          echo "COSMOS_KEY=$COSMOS_KEY" >> "$GITHUB_ENV"

      - name: Configure Static Web App API settings
        run: |
          set -euo pipefail
          az staticwebapp appsettings set \
            --name "$STATIC_WEB_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --setting-names \
              COSMOS_ENDPOINT="$COSMOS_ENDPOINT" \
              COSMOS_KEY="$COSMOS_KEY" \
              COSMOS_DATABASE="ProblemHuntDB" \
              COSMOS_CONTAINER_PROBLEMS="Problems" \
              COSMOS_CONTAINER_PROPOSALS="Proposals" \
              COSMOS_CONTAINER_UPVOTES="Upvotes" \
              COSMOS_CONTAINER_TIPS="Tips" \
              SUPABASE_JWT_SECRET="${{ secrets.SUPABASE_JWT_SECRET }}" \
              SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}" \
              SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_PATH }}
        env:
          VITE_API_BASE_URL: /
          VITE_FARO_URL: ${{ secrets.VITE_FARO_URL }}
          VITE_FARO_APP_NAME: ${{ secrets.VITE_FARO_APP_NAME }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ALCHEMY_SOLANA_RPC_URL: ${{ secrets.VITE_ALCHEMY_SOLANA_RPC_URL }}
          NODE_ENV: production
        run: npm run build

      - name: Deploy frontend + API to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ env.FRONTEND_PATH }}
          api_location: problem-hunt/python-function
          output_location: dist
          skip_app_build: true
