name: Deploy ProblemHunt to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.11'
  FRONTEND_PATH: 'problem-hunt'
  BACKEND_PATH: 'problem-hunt/python-function'
  TF_VERSION: '1.8.0'

permissions:
  contents: read

jobs:
  # ==========================================================================
  # JOB 1: Provision Infrastructure (Terraform)
  # ==========================================================================
  infrastructure:
    runs-on: ubuntu-latest
    name: Provision Infrastructure
    outputs:
      function_app_name: ${{ steps.tf.outputs.function_app_name }}
      function_app_hostname: ${{ steps.tf.outputs.function_app_hostname }}
      cosmos_endpoint: ${{ steps.tf.outputs.cosmos_endpoint }}
      cosmos_key: ${{ steps.tf.outputs.cosmos_key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # Azure Auth
      # If your AZURE_CREDENTIALS JSON has a bad subscriptionId, add a
      # AZURE_SUBSCRIPTION_ID secret with the correct one and the step below
      # will switch to it after login.
      # ------------------------------------------------------------------------
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Active Subscription (override if needed)
        run: |
          if [ -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "Switching to subscription from AZURE_SUBSCRIPTION_ID secret..."
            az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          fi
          az account show --output table

      # ------------------------------------------------------------------------
      # Terraform Backend
      # Run scripts/bootstrap-azure.ps1 locally ONCE to create the backend.
      # We do NOT create it in CI so a bad subscription can't break the build.
      # ------------------------------------------------------------------------
      - name: Verify Terraform Backend
        run: |
          az group show -n problemhunt --output table
          az storage account show -n problemhunttfstate --output table

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -var="function_app_name=${{ secrets.AZURE_FUNCTIONAPP_NAME }}"

      - name: Capture Terraform Outputs
        id: tf
        working-directory: infra
        run: |
          echo "function_app_name=$(terraform output -raw function_app_name)" >> $GITHUB_OUTPUT
          echo "function_app_hostname=$(terraform output -raw function_app_default_hostname)" >> $GITHUB_OUTPUT
          echo "cosmos_endpoint=$(terraform output -raw cosmos_db_endpoint)" >> $GITHUB_OUTPUT
          echo "cosmos_key=$(terraform output -raw cosmos_db_primary_key)" >> $GITHUB_OUTPUT

      - name: Configure Function App Settings
        run: |
          az functionapp config appsettings set \
            --name ${{ steps.tf.outputs.function_app_name }} \
            --resource-group problemhunt \
            --settings \
              COSMOS_ENDPOINT="${{ steps.tf.outputs.cosmos_endpoint }}" \
              COSMOS_KEY="${{ steps.tf.outputs.cosmos_key }}" \
              COSMOS_DATABASE="ProblemHuntDB" \
              COSMOS_CONTAINER_PROBLEMS="Problems" \
              COSMOS_CONTAINER_PROPOSALS="Proposals" \
              COSMOS_CONTAINER_UPVOTES="Upvotes" \
              COSMOS_CONTAINER_TIPS="Tips" \
              SUPABASE_JWT_SECRET="${{ secrets.SUPABASE_JWT_SECRET }}" \
              SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL }}" \
              SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

  # ==========================================================================
  # JOB 2: Build Frontend
  # ==========================================================================
  build-frontend:
    runs-on: ubuntu-latest
    needs: infrastructure
    name: Build Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci

      - name: Build Vite app
        working-directory: ${{ env.FRONTEND_PATH }}
        env:
          VITE_FARO_URL: ${{ secrets.VITE_FARO_URL }}
          VITE_FARO_APP_NAME: ${{ secrets.VITE_FARO_APP_NAME }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: https://${{ needs.infrastructure.outputs.function_app_hostname }}
          NODE_ENV: production
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_PATH }}/dist
          retention-days: 1

  # ==========================================================================
  # JOB 3: Deploy Frontend to SWA
  # ==========================================================================
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
    name: Deploy Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_PATH }}/dist

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: ${{ env.FRONTEND_PATH }}
          api_location: ""
          output_location: "dist"
          skip_app_build: true

  # ==========================================================================
  # JOB 4: Deploy Backend to Function App
  # ==========================================================================
  deploy-backend:
    runs-on: ubuntu-latest
    needs: infrastructure
    name: Deploy Backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Active Subscription (override if needed)
        run: |
          if [ -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "Switching to subscription from AZURE_SUBSCRIPTION_ID secret..."
            az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          fi
          az account show --output table

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ needs.infrastructure.outputs.function_app_name }}
          slot-name: 'production'
          package: ${{ env.BACKEND_PATH }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
