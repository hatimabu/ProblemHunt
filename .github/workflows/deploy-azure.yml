name: Deploy ProblemHunt to Azure

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.11'
  FRONTEND_PATH: 'problem-hunt'
  BACKEND_PATH: 'problem-hunt/python-function'

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Build Frontend
  # ---------------------------------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    name: Build Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci

      - name: Build Vite app
        working-directory: ${{ env.FRONTEND_PATH }}
        env:
          VITE_FARO_URL: ${{ secrets.VITE_FARO_URL }}
          VITE_FARO_APP_NAME: problemhunt
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_ALCHEMY_SOLANA_RPC_URL: ${{ secrets.VITE_ALCHEMY_SOLANA_RPC_URL }}
          NODE_ENV: production
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_PATH }}/dist
          retention-days: 1

  # ---------------------------------------------------------------------------
  # JOB 2: Deploy Frontend to Azure Static Web Apps
  # ---------------------------------------------------------------------------
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    name: Deploy Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_PATH }}/dist

      - name: Deploy to Azure Static Web Apps
        id: deploy-swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: ${{ env.FRONTEND_PATH }}
          api_location: ""          # Backend is a separate Function App
          output_location: "dist"
          skip_app_build: true      # We already built in the previous job

  # ---------------------------------------------------------------------------
  # JOB 3: Build & Deploy Backend (Python Azure Functions)
  # ---------------------------------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    name: Deploy Backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        id: deploy-functions
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          slot-name: 'production'
          package: ${{ env.BACKEND_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true

  # ---------------------------------------------------------------------------
  # JOB 4: Close Pull Request Environment
  # ---------------------------------------------------------------------------
  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Environment
    steps:
      - name: Close SWA Pull Request Environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
          app_location: ${{ env.FRONTEND_PATH }}
