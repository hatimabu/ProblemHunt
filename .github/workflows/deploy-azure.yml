name: Deploy ProblemHunt static app

on:
  push:
    branches: [main]
    paths:
      - 'azureARM.json'
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-azure.yml'
      - 'problem-hunt/**'
  workflow_dispatch:

concurrency:
  group: problemhunt-static-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: '20'
  FRONTEND_PATH: problem-hunt
  AZURE_RESOURCE_GROUP: problemhunt
  AZURE_LOCATION: eastus2
  AZURE_APP_NAME: problemhunt
  AZURE_TEMPLATE_FILE: ./azureARM.json

jobs:
  test:
    uses: ./.github/workflows/frontend-tests.yml

  migrate:
    name: Apply Supabase migrations
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - name: Push migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::Missing SUPABASE_DB_URL. Add it as a GitHub Actions repository secret using the Supabase direct Postgres connection string (with sslmode=require)."
            exit 1
          fi
          supabase db push --db-url "$SUPABASE_DB_URL"

  deploy:
    runs-on: ubuntu-latest
    name: Deploy static app
    needs: migrate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create or update static-hosting resource
        id: arm
        run: |
          set -euo pipefail
          az group create --name "$AZURE_RESOURCE_GROUP" --location "$AZURE_LOCATION"
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file "$AZURE_TEMPLATE_FILE" \
            --parameters appName="$AZURE_APP_NAME" location="$AZURE_LOCATION" environment=prod \
            --query properties.outputs --output json > deployment-outputs.json
          echo "STATIC_WEB_APP_NAME=$(jq -r '.staticWebAppName.value' deployment-outputs.json)" >> "$GITHUB_ENV"

      - name: Fetch Static Web App deployment token
        run: |
          set -euo pipefail
          SWA_TOKEN=$(az staticwebapp secrets list \
            --name "$STATIC_WEB_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "properties.apiKey" --output tsv)
          echo "::add-mask::$SWA_TOKEN"
          echo "SWA_DEPLOYMENT_TOKEN=$SWA_TOKEN" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_PATH }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ALCHEMY_SOLANA_RPC_URL: ${{ secrets.VITE_ALCHEMY_SOLANA_RPC_URL }}
          NODE_ENV: production
        run: npm run build

      - name: Deploy static app
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ${{ env.FRONTEND_PATH }}/dist
          output_location: ''
          skip_app_build: true
