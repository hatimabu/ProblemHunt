name: Python API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: problem-hunt/python-function

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run pytest
        env:
          COSMOS_ENDPOINT: placeholder-endpoint
          COSMOS_KEY: placeholder-key
          COSMOS_DATABASE: ProblemHuntDB
          COSMOS_CONTAINER_PROBLEMS: Problems
          COSMOS_CONTAINER_PROPOSALS: Proposals
          COSMOS_CONTAINER_UPVOTES: Upvotes
          COSMOS_CONTAINER_TIPS: Tips
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_JWT_SECRET: dummy-jwt-secret-for-testing
        run: python -m pytest test_all.py -v

      - name: Syntax & import smoke check
        env:
          COSMOS_ENDPOINT: placeholder-endpoint
          COSMOS_KEY: placeholder-key
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_JWT_SECRET: dummy-jwt-secret-for-testing
        run: |
          python -c "
          import os, sys
          os.environ.setdefault('COSMOS_ENDPOINT', 'placeholder-endpoint')
          os.environ.setdefault('COSMOS_KEY', 'placeholder-key')
          os.environ.setdefault('SUPABASE_URL', 'https://example.supabase.co')
          os.environ.setdefault('SUPABASE_ANON_KEY', 'dummy')
          os.environ.setdefault('SUPABASE_JWT_SECRET', 'dummy')
          errors = []
          for root, dirs, files in os.walk('.'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          with open(path, 'r', encoding='utf-8') as fh:
                              compile(fh.read(), path, 'exec')
                      except SyntaxError as e:
                          errors.append(f'Syntax error in {path}: {e}')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          print('All Python files compile successfully.')
          "
