name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  npm-lockfile:
    name: NPM Lockfile Integrity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify root lockfile
        run: npm ci

  frontend:
    name: Frontend Component Tests
    needs: npm-lockfile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: problem-hunt

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: problem-hunt/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        env:
          VITE_API_BASE_URL: http://localhost:7071
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: test-anon-key
        run: npm test
