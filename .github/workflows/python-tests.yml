name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  frontend:
    name: Frontend Component Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: problem-hunt

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: problem-hunt/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        env:
          VITE_API_BASE_URL: http://localhost:7071
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: test-anon-key
        run: npm test

  python:
    name: Python Handler Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: problem-hunt/python-function

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run pytest
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_JWT_SECRET: dummy-jwt-secret-for-testing
        run: python -m pytest test_all.py -v

      - name: Syntax & import smoke check
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_JWT_SECRET: dummy-jwt-secret-for-testing
        run: |
          python -c "
          import os, sys
          os.environ.setdefault('SUPABASE_URL', 'https://example.supabase.co')
          os.environ.setdefault('SUPABASE_ANON_KEY', 'dummy')
          os.environ.setdefault('SUPABASE_JWT_SECRET', 'dummy')
          errors = []
          for root, dirs, files in os.walk('.'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          with open(path, 'r', encoding='utf-8') as fh:
                              compile(fh.read(), path, 'exec')
                      except SyntaxError as e:
                          errors.append(f'Syntax error in {path}: {e}')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          print('All Python files compile successfully.')
          "
